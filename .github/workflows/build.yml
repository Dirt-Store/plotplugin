name: Build PlotDirt

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package --no-transfer-progress -B

      - name: List target directory
        run: ls -la target/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: PlotDirt-1.3.0
          path: target/PlotDirt-1.3.0.jar
          if-no-files-found: error
          retention-days: 30
